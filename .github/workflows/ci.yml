name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci || npm install

      - name: Lint (tsc --noEmit)
        run: npm run lint

      - name: Test (vitest)
        run: npm run test

      - name: Build
        run: npm run build
